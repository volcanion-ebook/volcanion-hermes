# Cleanup Workflow - Dọn dẹp artifacts và resources cũ
name: Cleanup

# Chạy hàng ngày lúc 3:00 AM UTC để cleanup
on:
  schedule:
    - cron: '0 3 * * *'
  # Cho phép manual trigger
  workflow_dispatch:

jobs:
  # Job 1: Cleanup old workflow runs
  cleanup-workflows:
    name: Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Get all workflows
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo,
            });
            
            // For each workflow, delete old runs
            for (const workflow of workflows.data.workflows) {
              console.log(`Processing workflow: ${workflow.name}`);
              
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: 100,
              });
              
              // Keep only the last 50 runs, delete older ones
              const runsToDelete = runs.data.workflow_runs.slice(50);
              
              for (const run of runsToDelete) {
                if (run.status === 'completed') {
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner,
                      repo,
                      run_id: run.id,
                    });
                    console.log(`Deleted run ${run.id} from ${workflow.name}`);
                  } catch (error) {
                    console.log(`Failed to delete run ${run.id}: ${error.message}`);
                  }
                }
              }
            }

  # Job 2: Cleanup old artifacts
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Get all artifacts
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
              per_page: 100,
            });
            
            const now = new Date();
            const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              
              if (createdAt < oneWeekAgo) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner,
                    repo,
                    artifact_id: artifact.id,
                  });
                  console.log(`Deleted artifact: ${artifact.name} (${artifact.created_at})`);
                } catch (error) {
                  console.log(`Failed to delete artifact ${artifact.id}: ${error.message}`);
                }
              }
            }

  # Job 3: Cleanup old releases (keep last 10)
  cleanup-releases:
    name: Cleanup Old Releases
    runs-on: ubuntu-latest
    
    steps:
      - name: Delete old releases
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            
            try {
              const releases = await github.rest.repos.listReleases({
                owner,
                repo,
                per_page: 100,
              });
              
              // Keep the latest 10 releases, delete older ones
              const releasesToDelete = releases.data.slice(10);
              
              for (const release of releasesToDelete) {
                if (!release.prerelease && !release.draft) {
                  try {
                    await github.rest.repos.deleteRelease({
                      owner,
                      repo,
                      release_id: release.id,
                    });
                    console.log(`Deleted release: ${release.tag_name}`);
                  } catch (error) {
                    console.log(`Failed to delete release ${release.id}: ${error.message}`);
                  }
                }
              }
            } catch (error) {
              console.log(`No releases found or error occurred: ${error.message}`);
            }

  # Job 4: Cleanup old container images
  cleanup-packages:
    name: Cleanup Old Container Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Delete old container images
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            
            try {
              // List packages (container images)
              const packages = await github.rest.packages.listPackagesForOrganization({
                org: owner,
                package_type: 'container',
                visibility: 'private',
              }).catch(() => {
                // Fallback to user packages if not an organization
                return github.rest.packages.listPackagesForAuthenticatedUser({
                  package_type: 'container',
                  visibility: 'private',
                });
              });
              
              for (const pkg of packages.data) {
                if (pkg.name === repo || pkg.name === `${owner}/${repo}`) {
                  console.log(`Processing package: ${pkg.name}`);
                  
                  const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                    org: owner,
                    package_type: 'container',
                    package_name: pkg.name,
                    per_page: 100,
                  }).catch(() => {
                    // Fallback to user packages
                    return github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser({
                      package_type: 'container',
                      package_name: pkg.name,
                      per_page: 100,
                    });
                  });
                  
                  // Keep the latest 20 versions, delete older ones
                  const versionsToDelete = versions.data.slice(20);
                  
                  for (const version of versionsToDelete) {
                    try {
                      await github.rest.packages.deletePackageVersionForOrg({
                        org: owner,
                        package_type: 'container',
                        package_name: pkg.name,
                        package_version_id: version.id,
                      }).catch(() => {
                        // Fallback to user packages
                        return github.rest.packages.deletePackageVersionForAuthenticatedUser({
                          package_type: 'container',
                          package_name: pkg.name,
                          package_version_id: version.id,
                        });
                      });
                      
                      console.log(`Deleted package version: ${version.name || version.id}`);
                    } catch (error) {
                      console.log(`Failed to delete package version ${version.id}: ${error.message}`);
                    }
                  }
                }
              }
            } catch (error) {
              console.log(`Package cleanup failed: ${error.message}`);
            }

  # Job 5: Generate cleanup summary
  cleanup-summary:
    name: Cleanup Summary
    runs-on: ubuntu-latest
    needs: [cleanup-workflows, cleanup-artifacts, cleanup-releases, cleanup-packages]
    if: always()
    
    steps:
      - name: Generate cleanup report
        run: |
          echo "🧹 Cleanup Summary"
          echo "=================="
          echo ""
          echo "📊 Cleanup Results:"
          echo "  🔄 Workflows: ${{ needs.cleanup-workflows.result }}"
          echo "  📦 Artifacts: ${{ needs.cleanup-artifacts.result }}"
          echo "  🏷️ Releases: ${{ needs.cleanup-releases.result }}"
          echo "  📱 Packages: ${{ needs.cleanup-packages.result }}"
          echo ""
          
          # Count successful cleanups
          SUCCESS_COUNT=0
          TOTAL_COUNT=4
          
          for result in "${{ needs.cleanup-workflows.result }}" "${{ needs.cleanup-artifacts.result }}" "${{ needs.cleanup-releases.result }}" "${{ needs.cleanup-packages.result }}"; do
            if [ "$result" = "success" ]; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            fi
          done
          
          echo "📈 Cleanup Status: $SUCCESS_COUNT/$TOTAL_COUNT completed successfully"
          echo ""
          
          if [ $SUCCESS_COUNT -eq $TOTAL_COUNT ]; then
            echo "✅ All cleanup tasks completed successfully!"
            echo "🎉 Repository is now cleaned up."
          else
            echo "⚠️ Some cleanup tasks had issues."
            echo "📋 Check individual job logs for details."
          fi
          
          echo ""
          echo "🗓️ Next cleanup: Tomorrow at 3:00 AM UTC"
